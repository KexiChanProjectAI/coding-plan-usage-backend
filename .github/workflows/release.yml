name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          go build -ldflags="-X main.version=${VERSION}" -o ucpqa ./cmd/api
          archive_name="ucpqa-${VERSION}-${GOOS}-${GOARCH}.tar.gz"
          tar -czf "${archive_name}" ucpqa

      - uses: actions/upload-artifact@v4
        with:
          name: ucpqa-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ucpqa-${{ github.ref_name }}-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ucpqa-*
          merge-multiple: false

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "ucpqa-*.tar.gz" | while read -r archive; do
            sha256sum "$archive"
          done > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/ucpqa-*
            artifacts/**/checksums.txt
          generate_release_notes: true
