<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>QuotaHub Dashboard</title>
  <style>
    :root {
      /* Background & Surface */
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --surface-glass: rgba(255, 255, 255, 0.05);
      --surface-glass-hover: rgba(255, 255, 255, 0.08);
      --border-glass: rgba(255, 255, 255, 0.1);

      /* Text */
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);

      /* Progress Bar Colors - 5H (Blue → Cyan) */
      --progress-5h-start: #3b82f6;
      --progress-5h-end: #06b6d4;
      --progress-5h-glow: rgba(6, 182, 212, 0.5);

      /* Progress Bar Colors - 7D (Green → Lime) */
      --progress-7d-start: #22c55e;
      --progress-7d-end: #a3e635;
      --progress-7d-glow: rgba(163, 230, 53, 0.5);

      /* Progress Bar Colors - 1M (Purple → Pink) */
      --progress-1m-start: #a855f7;
      --progress-1m-end: #ec4899;
      --progress-1m-glow: rgba(236, 72, 153, 0.5);

      /* Low Warning - Orange → Yellow */
      --progress-low-start: #f97316;
      --progress-low-end: #eab308;
      --progress-low-glow: rgba(234, 179, 8, 0.5);

      /* Critical - Red → Pink */
      --progress-critical-start: #ef4444;
      --progress-critical-end: #ec4899;
      --progress-critical-glow: rgba(236, 72, 153, 0.6);

      /* MD3 Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;

      /* Typography Scale */
      --text-caption: 12px;
      --text-body: 14px;
      --text-subtitle: 16px;
      --text-title: 20px;
      --text-headline: 24px;

      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      /* Safe Area */
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      background-image: radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      padding: var(--space-lg);
      padding-left: calc(var(--space-lg) + var(--safe-left));
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-md);
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .header-title {
      font-size: var(--text-headline);
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-subtitle {
      font-size: var(--text-body);
      color: var(--text-secondary);
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--space-sm);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .refresh-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .refresh-btn:hover {
      background: var(--surface-glass-hover);
      transform: scale(1.05);
    }

    .refresh-btn:active {
      transform: scale(0.95);
    }

    .refresh-btn svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    .refresh-btn.spinning svg {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .last-updated {
      font-size: var(--text-caption);
      color: var(--text-muted);
    }

    .time-badge {
      font-size: var(--text-caption);
      color: var(--text-secondary);
      background: var(--surface-glass);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-glass);
      font-variant-numeric: tabular-nums;
    }

    /* Plan Cards Container */
    .plans-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      flex: 1;
      overflow-y: auto;
      padding-bottom: var(--space-md);
    }

    /* Plan Card */
    .plan-card {
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .plan-card:hover {
      background: var(--surface-glass-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .plan-header {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }

    .plan-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-title);
      font-weight: 600;
      color: white;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .plan-info {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      min-width: 0;
    }

    .plan-name {
      font-size: var(--text-title);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
      font-size: var(--text-caption);
      font-weight: 500;
      width: fit-content;
    }

    .plan-badge.healthy {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .plan-badge.warning {
      background: rgba(234, 179, 8, 0.2);
      color: #facc15;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .plan-badge.critical {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* Quota Grid */
    .quota-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
    }

    .quota-block {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      padding: var(--space-md);
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-lg);
      min-width: 0;
    }

    .quota-block.empty {
      opacity: 0.3;
      justify-content: center;
      align-items: center;
    }

    .quota-label {
      font-size: var(--text-caption);
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .quota-remaining {
      font-size: var(--text-subtitle);
      font-weight: 600;
      white-space: nowrap;
    }

    .quota-percentage {
      font-size: var(--text-caption);
      color: var(--text-secondary);
    }

    .progress-container {
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      border-radius: 5px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .progress-bar.glow {
      filter: drop-shadow(0 0 6px var(--glow-color, rgba(255, 255, 255, 0.3)));
    }

    /* Progress Bar Color Classes */
    .progress-5h {
      background: linear-gradient(90deg, var(--progress-5h-start), var(--progress-5h-end));
      --glow-color: var(--progress-5h-glow);
    }

    .progress-7d {
      background: linear-gradient(90deg, var(--progress-7d-start), var(--progress-7d-end));
      --glow-color: var(--progress-7d-glow);
    }

    .progress-1m {
      background: linear-gradient(90deg, var(--progress-1m-start), var(--progress-1m-end));
      --glow-color: var(--progress-1m-glow);
    }

    .progress-low {
      background: linear-gradient(90deg, var(--progress-low-start), var(--progress-low-end));
      --glow-color: var(--progress-low-glow);
    }

    .progress-critical {
      background: linear-gradient(90deg, var(--progress-critical-start), var(--progress-critical-end));
      --glow-color: var(--progress-critical-glow);
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: var(--space-lg);
      padding: var(--space-md);
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-caption);
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .legend-dot.high {
      background: linear-gradient(135deg, #22c55e, #4ade80);
    }

    .legend-dot.medium {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
    }

    .legend-dot.low {
      background: linear-gradient(135deg, #f97316, #eab308);
    }

    .legend-dot.critical {
      background: linear-gradient(135deg, #ef4444, #ec4899);
    }

    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg,
        var(--surface-glass) 25%,
        rgba(255, 255, 255, 0.1) 50%,
        var(--surface-glass) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: var(--radius-md);
    }

    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      height: 180px;
    }

    .skeleton-header {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }

    .skeleton-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }

    .skeleton-text {
      flex: 1;
    }

    .skeleton-text-row {
      height: 16px;
      margin-bottom: var(--space-sm);
    }

    .skeleton-text-row:last-child {
      width: 60%;
      margin-bottom: 0;
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
    }

    .skeleton-quota {
      height: 100px;
      border-radius: var(--radius-lg);
    }

    /* Error Banner */
    .error-banner {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      color: #f87171;
    }

    .error-banner svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .error-banner-content {
      flex: 1;
    }

    .error-banner-title {
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .error-banner-message {
      font-size: var(--text-caption);
      opacity: 0.8;
    }

    .retry-btn {
      padding: var(--space-sm) var(--space-md);
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius-sm);
      color: #f87171;
      cursor: pointer;
      font-size: var(--text-caption);
      transition: all 0.2s;
    }

    .retry-btn:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* Responsive */
    @media (max-width: 600px) {
      body {
        padding: var(--space-md);
        padding-left: calc(var(--space-md) + var(--safe-left));
      }

      .header {
        flex-direction: column;
        gap: var(--space-md);
      }

      .header-right {
        align-items: flex-start;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .quota-grid {
        grid-template-columns: 1fr;
        gap: var(--space-sm);
      }

      .plan-card {
        padding: var(--space-md);
      }

      .legend {
        gap: var(--space-md);
      }
    }

    @media (min-width: 800px) {
      .quota-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Desktop adjustments for ultra-wide feel */
    @media (min-width: 1200px) {
      body {
        max-width: 1400px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Coding Plans</h1>
      <p class="header-subtitle">Overview of your coding plan usage</p>
    </div>
    <div class="header-right">
      <div class="header-actions">
        <button class="refresh-btn" id="refreshBtn" aria-label="Refresh data">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
        <div class="time-badge" id="timeBadge">--:--:--</div>
      </div>
      <span class="last-updated" id="lastUpdated">Last updated: --</span>
    </div>
  </header>

  <main class="plans-container" id="plansContainer">
    
  </main>

  <footer class="legend">
    <div class="legend-item">
      <span class="legend-dot high"></span>
      <span>High 70–100%</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot medium"></span>
      <span>Medium 30–70%</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot low"></span>
      <span>Low 10–30%</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot critical"></span>
      <span>Critical 0–10%</span>
    </div>
  </footer>

  <script>
    const API_URL = 'http://100.64.1.38:8070/api/v1/usage';
    const REFRESH_INTERVAL = 60000;

    const quotaTypeMap = {
      '5H': '5H',
      '1W': '7D',
      '1M': '1M'
    };

    const quotaOrder = ['5H', '7D', '1M'];

    let lastFetchTime = null;
    let refreshTimer = null;

    // DOM Elements
    const plansContainer = document.getElementById('plansContainer');
    const refreshBtn = document.getElementById('refreshBtn');
    const lastUpdatedEl = document.getElementById('lastUpdated');
    const timeBadge = document.getElementById('timeBadge');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      updateTime();
      setInterval(updateTime, 1000);
      fetchData();
      startAutoRefresh();
    });

    refreshBtn.addEventListener('click', () => {
      fetchData(true);
    });

    function updateTime() {
      const now = new Date();
      timeBadge.textContent = now.toLocaleTimeString('en-US', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => fetchData(), REFRESH_INTERVAL);
    }

    function getTimeAgo(date) {
      if (!date) return '--';
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return `${hours}h ago`;
    }

    function formatDuration(used, total) {
      const remaining = Math.max(0, total - used);
      const hours = Math.floor(remaining / 60);
      const minutes = remaining % 60;
      if (hours > 0) {
        return `${hours}h ${minutes}m left`;
      }
      return `${minutes}m left`;
    }

    function getProgressClass(percentage, quotaType) {
      if (percentage <= 10) return 'critical';
      if (percentage <= 30) return 'low';
      return `progress-${quotaType.toLowerCase().replace('7d', '7d')}`;
    }

    function getProgressColorClass(percentage, quotaType) {
      if (percentage <= 10) return 'progress-critical';
      if (percentage <= 30) return 'progress-low';
      return `progress-${quotaType.toLowerCase().replace('7d', '7d')}`;
    }

    function getAvatarColor(platform) {
      const colors = [
        '#3b82f6', '#8b5cf6', '#ec4899', '#f97316',
        '#22c55e', '#06b6d4', '#eab308', '#ef4444'
      ];
      let hash = 0;
      for (let i = 0; i < platform.length; i++) {
        hash = platform.charCodeAt(i) + ((hash << 5) - hash);
      }
      return colors[Math.abs(hash) % colors.length];
    }

    function getStatusClass(status) {
      if (!status) return 'healthy';
      const s = status.toLowerCase();
      if (s === 'healthy' || s === 'active') return 'healthy';
      if (s === 'warning' || s === 'limited') return 'warning';
      return 'critical';
    }

    function formatStatusLabel(status) {
      if (!status) return 'Unknown';
      return status.charAt(0).toUpperCase() + status.slice(1) + ' Plan';
    }

    function renderLoadingSkeletons() {
      plansContainer.innerHTML = `
        <div class="skeleton-card skeleton" style="height: 200px;"></div>
        <div class="skeleton-card skeleton" style="height: 200px;"></div>
        <div class="skeleton-card skeleton" style="height: 200px;"></div>
      `;
    }

    function renderError(message, isManual = false) {
      const errorHTML = `
        <div class="error-banner">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
          <div class="error-banner-content">
            <div class="error-banner-title">Failed to load data</div>
            <div class="error-banner-message">${message}</div>
          </div>
          ${isManual ? '' : `<button class="retry-btn" onclick="fetchData()">Retry</button>`}
        </div>
        ${renderSampleCards()}
      `;
      plansContainer.innerHTML = errorHTML;
    }

    function renderSampleCards() {
      return `
        <div class="plan-card">
          <div class="plan-header">
            <div class="plan-avatar" style="background: linear-gradient(135deg, #3b82f6, #8b5cf6);">S</div>
            <div class="plan-info">
              <div class="plan-name">Sample Plan</div>
              <span class="plan-badge healthy">Pro Plan</span>
            </div>
          </div>
          <div class="quota-grid">
            <div class="quota-block">
              <span class="quota-label">5H</span>
              <span class="quota-remaining">-- remaining</span>
              <span class="quota-percentage">--%</span>
              <div class="progress-container">
                <div class="progress-bar progress-5h" style="width: 0%;"></div>
              </div>
            </div>
            <div class="quota-block">
              <span class="quota-label">7D</span>
              <span class="quota-remaining">-- remaining</span>
              <span class="quota-percentage">--%</span>
              <div class="progress-container">
                <div class="progress-bar progress-7d" style="width: 0%;"></div>
              </div>
            </div>
            <div class="quota-block empty">
              <span class="quota-label">1M</span>
              <span class="quota-remaining">—</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderPlans(data) {
      if (!Array.isArray(data) || data.length === 0) {
        plansContainer.innerHTML = `
          <div class="error-banner">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <div class="error-banner-content">
              <div class="error-banner-title">No data available</div>
              <div class="error-banner-message">No usage data found. Check back later.</div>
            </div>
          </div>
        `;
        return;
      }

      plansContainer.innerHTML = data.map(plan => {
        const platformName = plan.platform || 'Unknown';
        const avatarColor = getAvatarColor(platformName);
        const status = plan.status || 'healthy';
        const statusClass = getStatusClass(status);
        const statusLabel = formatStatusLabel(status);

        const quotas = plan.quotas || {};

        const quotaBlocks = quotaOrder.map(type => {
          const displayType = type;
          const apiType = type === '7D' ? '1W' : type;
          const quota = quotas[apiType];

          if (!quota) {
            return `
              <div class="quota-block empty">
                <span class="quota-label">${displayType}</span>
                <span class="quota-remaining">—</span>
              </div>
            `;
          }

          const used = quota.used || 0;
          const total = quota.total || 1;
          const percentage = Math.round(((total - used) / total) * 100);
          const clampedPercentage = Math.max(0, Math.min(100, percentage));
          const remainingText = formatDuration(used, total);
          const colorClass = getProgressColorClass(clampedPercentage, displayType);
          const isLow = clampedPercentage <= 30;

          return `
            <div class="quota-block">
              <span class="quota-label">${displayType}</span>
              <span class="quota-remaining">${remainingText}</span>
              <span class="quota-percentage">${clampedPercentage}%</span>
              <div class="progress-container">
                <div class="progress-bar ${colorClass} ${isLow ? 'glow' : ''}" style="width: ${clampedPercentage}%;"></div>
              </div>
            </div>
          `;
        }).join('');

        return `
          <article class="plan-card">
            <div class="plan-header">
              <div class="plan-avatar" style="background: linear-gradient(135deg, ${avatarColor}, ${avatarColor}dd);">
                ${platformName.charAt(0)}
              </div>
              <div class="plan-info">
                <h2 class="plan-name">${platformName}</h2>
                <span class="plan-badge ${statusClass}">${statusLabel}</span>
              </div>
            </div>
            <div class="quota-grid">
              ${quotaBlocks}
            </div>
          </article>
        `;
      }).join('');
    }

    async function fetchData(isManual = false) {
      if (isManual) {
        refreshBtn.classList.add('spinning');
      }

      try {
        const response = await fetch(API_URL, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          },
          signal: AbortSignal.timeout(10000)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        lastFetchTime = new Date();
        lastUpdatedEl.textContent = `Last updated: ${getTimeAgo(lastFetchTime)}`;

        renderPlans(data);
      } catch (error) {
        console.error('Fetch error:', error);
        const message = error.name === 'AbortError'
          ? 'Request timed out. Check your connection.'
          : error.message || 'Unable to connect to server';
        renderError(message, isManual);
      } finally {
        refreshBtn.classList.remove('spinning');
      }
    }

    // Update "last updated" text periodically
    setInterval(() => {
      if (lastFetchTime) {
        lastUpdatedEl.textContent = `Last updated: ${getTimeAgo(lastFetchTime)}`;
      }
    }, 10000);
  </script>
</body>
</html>
